<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IB Pending Monitor</title>

<link rel="icon" href="assets/favicon.ico">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo-area">

            <img src="assets/logo.png">

            <h2>IB Pending Monitor</h2>

        </div>

        <nav>

            <a class="active">📊 Dashboard</a>

            <a>📦 Pending</a>

            <a>📈 Analytics</a>

            <a>📑 Reports</a>

            <a>⚙ Settings</a>

        </nav>

    </aside>

    <main>

        <header>

            <div>

                <h1>Dashboard</h1>

                <small id="lastUpdate">
                    Loading...
                </small>

            </div>

            <button id="refreshBtn">

                Refresh

            </button>

        </header>

        <section class="cards">

            <div class="card">

                <h3>Pending IB</h3>

                <h1 id="pendingIB">-</h1>

            </div>

            <div class="card">

                <h3>Pending SKU</h3>

                <h1 id="pendingSKU">-</h1>

            </div>

            <div class="card">

                <h3>Pending Cost</h3>

                <h1 id="pendingCost">-</h1>

            </div>

            <div class="card">

                <h3>Average Aging</h3>

                <h1 id="avgAging">-</h1>

            </div>

            <div class="card warning">

                <h3>42+ Days</h3>

                <h1 id="warning">-</h1>

            </div>

            <div class="card critical">

                <h3>56+ Days</h3>

                <h1 id="critical">-</h1>

            </div>

        </section>

        <section class="chart-area">

            Chart Area

        </section>

        <section class="table-area">

            Data Table

        </section>

    </main>

</div>

<script src="api/sheet.js"></script>

<script src="js/app.js"></script>

</body>

</html>
